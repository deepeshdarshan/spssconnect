<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/app-logo.ico" type="image/x-icon">
  <link rel="icon" href="assets/app-logo.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="assets/app-logo.png">
  <title>SPSS Connect</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/styles-core.css" rel="stylesheet">
  <link href="css/styles-public.css" rel="stylesheet">
</head>
<body class="landing-page">

  <div class="landing-lang-toggle">
    <div class="lang-toggle">
      <button class="lang-btn active" type="button" id="langEN" data-lang="en">EN</button>
      <button class="lang-btn" type="button" id="langML" data-lang="ml">ML</button>
    </div>
  </div>

  <div class="landing-wrapper">
    <div class="landing-bg-pattern" aria-hidden="true"></div>

    <main class="landing-main">
      <div class="landing-hero">
        <div class="landing-hero__panel">
          <div class="landing-brand">
            <img src="assets/app-logo.png" alt="SPSS Connect" class="landing-logo landing-logo--app" width="200" height="280">
          </div>
          <p class="landing-tagline landing-tagline--primary" data-i18n="landing.tagline1">ശ്രീ പുഷ്പകബ്രാഹ്മണ സേവാ സംഘം</p>
          <p class="landing-tagline" data-i18n="landing.tagline2">എറണാകുളം ജില്ല</p>
          <p class="landing-sub" data-i18n="landing.sub">Submit your details and help us build a stronger, connected community.</p>
          <a href="phone-check" class="btn btn-landing">
            <span data-i18n="landing.cta">Get Started</span><i class="bi bi-arrow-right ms-2" aria-hidden="true"></i>
          </a>
        </div>
      </div>
    </main>

    <footer class="landing-footer">
      <small data-i18n="landing.footer">&copy; 2026 SPSS Connect. All rights reserved.</small>
    </footer>
  </div>

  <script type="module" src="js/pages/landing-page.js"></script>

</body>
</html>
