<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="assets/logo.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="assets/logo.png">
  <title>SPSS Connect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Noto+Serif+Malayalam:wght@500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>

  <div class="landing-lang-toggle">
    <div class="lang-toggle">
      <button class="lang-btn active" type="button" id="langEN" data-lang="en">EN</button>
      <button class="lang-btn" type="button" id="langML" data-lang="ml">ML</button>
    </div>
  </div>

  <div class="landing-wrapper">
    <div class="landing-content text-center">
      <img src="assets/logo.png" alt="SPSS Logo" class="landing-logo">
      <h1 class="landing-title" data-i18n="landing.title">SPSS Connect</h1>
      <p class="landing-tagline landing-tagline--primary" data-i18n="landing.tagline1">ശ്രീ പുഷ്പകബ്രാഹ്മണ സേവാ സംഘം</p>
      <p class="landing-tagline" data-i18n="landing.tagline2">എറണാകുളം ജില്ല</p>
      <p class="landing-sub" data-i18n="landing.sub">Submit your details and help us build a stronger, connected community.</p>
      <a href="phone-check" class="btn btn-landing">
        <span data-i18n="landing.cta">Get Started</span><i class="bi bi-arrow-right ms-2" aria-hidden="true"></i>
      </a>
    </div>
    <div class="landing-footer">
      <small data-i18n="landing.footer">&copy; 2026 SPSS Connect. All rights reserved.</small>
    </div>
  </div>

  <script type="module" src="js/pages/landing-page.js"></script>

</body>
</html>
