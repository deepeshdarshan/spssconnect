<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/app-logo.ico" type="image/x-icon">
  <link rel="icon" href="assets/app-logo.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="assets/app-logo.png">
  <title>SPSS Connect — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/styles-core.css" rel="stylesheet">
  <link href="css/styles-public.css" rel="stylesheet">
  <script src="js/firebase-app-check-debug.js"></script>
  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js",
      "firebase/storage": "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js",
      "firebase/app-check": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check.js"
    }
  }
  </script>
</head>
<body class="landing-page login-page">

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-popup" role="status" aria-live="polite" aria-busy="true">
      <div class="spinner-border" role="status"><span class="visually-hidden">Loading</span></div>
      <p class="loading-popup-message">Please wait…</p>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container-spss"></div>

  <div class="landing-wrapper">
    <div class="landing-bg-pattern" aria-hidden="true"></div>

    <main class="landing-main">
      <div class="landing-hero">
        <div class="landing-hero__panel">
          <div class="landing-brand">
            <a href="/" class="login-brand-link" aria-label="Go to home">
              <img src="assets/app-logo.png" alt="SPSS Connect" class="landing-logo landing-logo--app" width="160" height="224">
            </a>
          </div>
          <p class="landing-tagline landing-tagline--primary">Sree Pushpaka Brahmana Seva Sangham</p>
          <p class="landing-tagline">Ernakulam Jilla</p>

          <form id="loginForm" class="login-form" autocomplete="on" method="post" action="#">
            <div class="mb-3">
              <label for="loginEmail" class="form-label">Username</label>
              <div class="input-group login-input-group">
                <span class="input-group-text" aria-hidden="true"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control" id="loginEmail" name="username" placeholder="Enter your username" autocomplete="username" required>
              </div>
            </div>
            <div class="mb-3">
              <label for="loginPassword" class="form-label">Password</label>
              <div class="input-group login-input-group">
                <span class="input-group-text" aria-hidden="true"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" id="loginPassword" name="password" placeholder="Enter your password" required>
              </div>
            </div>
            <button type="submit" class="btn btn-landing w-100 justify-content-center gap-2 mt-1" id="loginBtn">
              <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
              <span class="btn-text">Sign In</span>
            </button>
          </form>
        </div>
      </div>
    </main>

    <footer class="landing-footer">
      <small>&copy; 2026 SPSS Connect. All rights reserved.</small>
    </footer>
  </div>

  <script type="module" src="js/login-init.js"></script>
</body>
</html>
