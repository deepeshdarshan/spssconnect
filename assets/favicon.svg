<?xml version="1.0" encoding="UTF-8"?>
<!--
  SPSS Connect  browser favicon (vector, tab-sized).
  Simplified from the full logo: warm flame + lamp read at 1632px; PNG fallback in HTML.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="SPSS Connect">
  <defs>
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5c1f0a"/>
      <stop offset="45%" stop-color="#9e3f08"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="35%" stop-color="#fdba74"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </radialGradient>
    <linearGradient id="bowl" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
    <filter id="shade" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1c0a06" flood-opacity="0.45"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#fef3c7" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Outer flame / teardrop (reads as one shape in the tab) -->
  <path
    filter="url(#shade)"
    fill="url(#frame)"
    d="M32 4c4.5 6.2 18 18.5 18 30.5a18 18 0 1 1-36 0C14 22.5 27.5 10.2 32 4z"
  />
  <path fill="url(#glow)" d="M32 10c3.8 5.4 14 15.2 14 24.5a14 14 0 1 1-28 0C18 25.2 28.2 15.4 32 10z" />
  <!-- Lamp bowl -->
  <ellipse cx="32" cy="40" rx="12" ry="5.5" fill="url(#bowl)" />
  <ellipse cx="32" cy="36.5" rx="9" ry="3.5" fill="#fef3c7" opacity="0.85" />
  <!-- Flame -->
  <path
    filter="url(#soft)"
    fill="#fffbeb"
    d="M32 18c2.2 3.5 6 7.2 6 12.2a6 6 0 1 1-12 0c0-5 3.8-8.7 6-12.2z"
  />
  <path fill="#fde047" d="M32 22c1.3 2.2 3.5 4.6 3.5 8a3.5 3.5 0 1 1-7 0c0-3.4 2.2-5.8 3.5-8z" opacity="0.95" />
</svg>
